name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" build

      - name: Run targeted test suite
        run: >
          pytest
          tests/unit/test_generator.py
          tests/unit/test_validator.py
          tests/unit/test_templates.py
          tests/integration/test_cli.py
          -q

      - name: Build distribution artifacts
        run: python -m build

      - name: Verify packaged template assets
        run: >
          python -c "import pathlib, zipfile; wheel = next(pathlib.Path('dist').glob('*.whl'));
          required = 'ragfactory/templates/entrypoints/common/.env.example.j2';
          names = set(zipfile.ZipFile(wheel).namelist());
          assert required in names, f'Missing {required} in {wheel}'"
