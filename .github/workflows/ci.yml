name: CI

on:
  pull_request:
  push:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]" build twine

      - name: Run targeted test suite
        run: >
          python -m pytest
          tests/unit/test_generator.py
          tests/unit/test_validator.py
          tests/unit/test_templates.py
          tests/integration/test_cli.py
          -q

      - name: Build distribution artifacts
        run: python -m build

      - name: Check distribution metadata
        run: python -m twine check dist/*

      - name: Verify packaged template assets
        run: >
          python -c "import pathlib, zipfile; wheel = next(pathlib.Path('dist').glob('*.whl'));
          required = 'ragfactory/templates/entrypoints/common/.env.example.j2';
          names = set(zipfile.ZipFile(wheel).namelist());
          assert required in names, f'Missing {required} in {wheel}'"
