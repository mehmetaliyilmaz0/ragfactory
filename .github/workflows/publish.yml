name: Publish to PyPI

on:
  push:
    tags:
      - "v*"   # v0.1.0, v0.2.0, v1.0.0 ...

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]" build twine

      - name: Run targeted test suite
        run: >
          python -m pytest
          tests/unit/test_generator.py
          tests/unit/test_validator.py
          tests/unit/test_templates.py
          tests/integration/test_cli.py
          -q

      - name: Build
        run: python -m build

      - name: Check distribution metadata
        run: python -m twine check dist/*

      - name: Verify packaged template assets
        run: >
          python -c "import pathlib, zipfile; wheel = next(pathlib.Path('dist').glob('*.whl'));
          required = 'ragfactory/templates/entrypoints/common/.env.example.j2';
          names = set(zipfile.ZipFile(wheel).namelist());
          assert required in names, f'Missing {required} in {wheel}'"

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload dist/*
